{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center mb-4" style="color: #4a7c59;">⚙️ Account Settings</h2>
            <h5 class="mb-3" style="color: #4a7c59;">🔒 Change Password</h5>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Current Password</label>
                    <input type="password" name="old_password" class="form-control"
                           placeholder="Enter current password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">New Password</label>
                    <input type="password" name="new_password" class="form-control"
                           placeholder="Enter new password (min 6 characters)" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control"
                           placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    🔒 Change Password
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="/dashboard" style="color: #4a7c59;">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
