{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center mb-2" style="color: #4a7c59;">🔑 Forgot Password</h2>
            <p class="text-center text-muted mb-4">Enter your registered email to reset password</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Registered Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">New Password</label>
                    <input type="password" name="new_password" class="form-control"
                           placeholder="Enter new password (min 6 characters)" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control"
                           placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    🔑 Reset Password
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="/login" style="color: #4a7c59;">← Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
