{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center mb-1" style="color: #4a7c59;">🌿 Create Account</h2>
            <p class="text-center text-muted mb-4">Join Ayurvedic Diet System</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text">+91</span>
                        <input type="tel" name="phone" class="form-control" 
                               placeholder="10-digit mobile number" 
                               pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                    <small class="text-muted">Enter 10-digit Indian mobile number</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Create a strong password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Register As</label>
                    <select name="role" class="form-select">
                        <option value="patient">🧘 Patient</option>
                        <option value="practitioner">👨‍⚕️ Ayurvedic Practitioner</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Register Now</button>
            </form>
            <p class="text-center mt-3 text-muted">
                Already have an account? <a href="/login" style="color: #4a7c59;">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
